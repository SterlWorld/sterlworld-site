<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SterlWorld UI Demo</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0d0d0d;
            color: white;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 80px 20px;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p.subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 40px;
        }

        .buttons {
            margin-bottom: 60px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            margin: 10px;
            cursor: pointer;
            border: none;
        }

        .primary {
            background: #00c8ff;
            color: #000;
        }

        .primary:hover {
            background: #00e0ff;
        }

        .secondary {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
        }

        .secondary:hover {
            background: #fff;
            color: #000;
        }

        .mockup {
            width: 100%;
            max-width: 420px;
            margin: 40px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 80px;
            flex-wrap: wrap;
        }

        .feature {
            width: 260px;
            padding: 20px;
            background: #111;
            border-radius: 12px;
            border: 1px solid #222;
        }

        .feature h3 {
            margin-bottom: 10px;
        }

        footer {
            margin-top: 100px;
            opacity: 0.5;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SterlWorld UI Demo</h1>
        <p class="subtitle">A clean, modern landing page proving UI/UX design skill.</p>

        <div class="buttons">
            <button class="btn primary">Get Started</button>
            <button class="btn secondary">Learn More</button>
        </div>

        <img class="mockup" src="https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/assets/images/SterlWorld-Logo-2026.png">

        <div class="features">
            <div class="feature">
                <h3>Clean Layout</h3>
                <p>Modern spacing, hierarchy, and visual balance.</p>
            </div>
            <div class="feature">
                <h3>Modern UI</h3>
                <p>Buttons, typography, and components that feel premium.</p>
            </div>
            <div class="feature">
                <h3>Responsive</h3>
                <p>Looks great on desktop, tablet, and mobile.</p>
            </div>
        </div>

        <footer>© 2026 SterlWorld Entertainment LLC</footer>
    </div>

</body>
</html>
