<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>SterlWorld</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      width: 100%;
      background: black;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow: hidden;
      cursor: url('https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/Dale%20Glove%20cursor2.png') 4 0, auto;
    }

    /* --- ENTER SCREEN --- */
    #enter-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
    #enter-screen.hidden { opacity: 0; pointer-events: none; }
    #enter-screen h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 8vw, 4rem);
      color: #fff;
      text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px #0ff,
        0 0 70px #0ff;
      animation: enterGlow 3s ease-in-out infinite alternate;
      user-select: none;
      opacity: 1;
      transition: opacity 0.5s ease-in;
    }
    #enter-screen.hiding h1 { opacity: 0; }

    @keyframes enterGlow {
      from { text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 35px #0ff, 0 0 60px #0ff; }
      to   { text-shadow: 0 0 15px #fff, 0 0 25px #fff, 0 0 50px #0ff, 0 0 80px #0ff; }
    }
    @keyframes twinkle {
      0% { opacity: 0; } 50% { opacity: 0.8; } 100% { opacity: 0; }
    }
    .star {
      position: absolute;
      background-color: white;
      border-radius: 50%;
      box-shadow: 0 0 4px #fff, 0 0 8px #fff;
      animation: twinkle 4s infinite;
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
    }

    .loading-bar {
      width: 300px;
      height: 12px;
      background: #111;
      border-radius: 10px;
      margin-top: 20px;
      overflow: hidden;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: #0ff;
    }

    /* CANVAS */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    /* LOGO */
    #logo-wrapper {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      display: none;
    }

    #logo { width: 220px; }

    /* MESSAGE */
    #message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      display: none;
      pointer-events: auto;
    }

    #message h1 {
      font-family: 'Orbitron';
      text-shadow: 0 0 20px #0ff;
      margin-bottom: 10px;
    }

    #message p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .cta a {
      margin: 5px;
      padding: 10px 16px;
      border: 1px solid #0ff;
      color: #0ff;
      text-decoration: none;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      display: none;
    }

  </style>
</head>

<body>

<nav style="
position: fixed;
top: 20px;
right: 30px;
z-index: 9999;
display: flex;
gap: 20px;
font-size: 0.9rem;
">
  <a href="/" style="color:#0ff;text-decoration:none;">Home</a>
  <a href="/about" style="color:#0ff;text-decoration:none;">About</a>
  <a href="/contact" style="color:#0ff;text-decoration:none;">Contact</a>
</nav>

<div id="enter-screen">
  <h1>Tap to Enter</h1>
</div>

<div id="loader">
  <div>Loading SterlWorld</div>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="barFill"></div>
  </div>
</div>

<canvas id="space"></canvas>

<div id="logo-wrapper">
  <img src="https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/about/SterlWorld%20Logo%202026.png" id="logo">
</div>

<div id="message">
  <h1>A Universe in the Making</h1>
<p>
SterlWorld is an independent game and multimedia studio creating original worlds,
characters, and interactive experiences.
</p>

<div style="margin-top:20px; pointer-events:auto;">
  <a href="/about" style="margin:5px;padding:10px 16px;border:1px solid #0ff;color:#0ff;text-decoration:none;border-radius:6px;">About</a>
  <a href="/pizzadales" style="margin:5px;padding:10px 16px;border:1px solid #0ff;color:#0ff;text-decoration:none;border-radius:6px;">Pizza Dales</a>
  <a href="/contact" style="margin:5px;padding:10px 16px;border:1px solid #0ff;color:#0ff;text-decoration:none;border-radius:6px;">Contact</a>
</div>
</div>

<footer style="
position: fixed;
bottom: 10px;
width: 100%;
text-align: center;
font-size: 0.75rem;
color: #666;
z-index: 9999;
">
  © 2025 SterlWorld Entertainment LLC<br>
  <a href="/privacy" style="color:#0ff;">Privacy Policy</a> • 
  <a href="/terms" style="color:#0ff;">Terms of Service</a>
</footer>

<script>
const enter = document.getElementById("enter-screen");
const loader = document.getElementById("loader");
const fill = document.getElementById("barFill");

enter.onclick = () => {
  enter.style.display = "none";
  loader.style.display = "flex";

  let progress = 0;
  let interval = setInterval(() => {
    progress += 5;
    fill.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);
      loader.style.display = "none";

      document.getElementById("logo-wrapper").style.display = "block";
      document.getElementById("message").style.display = "block";
      document.querySelector("footer").style.display = "block";
    }
  }, 80);
};

/* STARFIELD */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

const starImage = new Image();
starImage.src = "https://raw.githubusercontent.com/SterlWorld/sterlworld-site/main/Star.png";

let stars = [];
function createStar() {
  return {
    x: (Math.random() - 0.5) * w * 2,
    y: (Math.random() - 0.5) * h * 2,
    z: Math.random() * w
  };
}

for (let i = 0; i < 200; i++) stars.push(createStar());

function animate() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, w, h);

  stars.forEach((s, i) => {
    s.z -= 0.5;
    if (s.z <= 0) stars[i] = createStar();

    let k = 128 / s.z;
    let px = s.x * k + w / 2;
    let py = s.y * k + h / 2;

    let size = (1 - s.z / w) * 20;

    if (starImage.complete) {
      ctx.drawImage(starImage, px, py, size, size);
    }
  });

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
