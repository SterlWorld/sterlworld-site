<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<title>SterlWorld</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  width:100%;
  background:black;
  font-family:'Poppins', sans-serif;
  color:white;
  overflow:hidden;
}

/* NAV */
nav {
  position:fixed;
  top:20px;
  right:30px;
  z-index:9999;
  display:flex;
  gap:20px;
  font-size:0.9rem;
  opacity:0;
  transition:opacity 1.5s ease;
}
nav.visible { opacity:1; }

nav a {
  color:#0ff;
  text-decoration:none;
  opacity:0.6;
  transition:0.3s;
}
nav a:hover { 
  opacity:1; 
  text-shadow:0 0 8px #0ff;
}

/* ENTER */
#enter-screen {
  position:fixed;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100000;
  cursor:pointer;
}
#enter-screen h1 {
  font-family:'Orbitron';
  font-size:clamp(2rem,8vw,4rem);
  text-shadow:0 0 40px #0ff;
}

/* LOADER */
#loader {
  position:fixed;
  width:100%;
  height:100%;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:99999;
}

#loader h2 {
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  text-align: center;
}

.loading-bar {
  width:420px;
  height:20px;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  margin-top:20px;
  box-shadow:0 0 12px #0ff;
}

.loading-bar-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#0ff,#ff5ec4,#ffd700);
  box-shadow:0 0 25px #0ff;
  transition:width 0.3s ease;
}

/* CANVAS */
canvas {
  position:fixed;
  top:0;
  left:0;
  opacity:0;
  transition:opacity 1s;
}
canvas.visible { opacity:1; }

/* LOGO */
#logo-wrapper {
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  z-index:10;
  opacity:0;
  transition:1.5s;
}
#logo-wrapper.visible { opacity:1; }

#logo {
  width:220px;
}

/* MESSAGE */
#message {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  opacity:0;
  transition:1.5s;
}
#message.visible { opacity:1; }

#message h1 {
  font-family:'Orbitron';
  text-shadow:0 0 20px #0ff;
  margin-bottom:10px;
}
#message p {
  color:#ccc;
  margin-bottom:20px;
}

/* CTA */
.cta a {
  margin:5px;
  padding:12px 18px;
  border:1px solid rgba(0,255,255,0.6);
  color:white;
  text-decoration:none;
  border-radius:8px;

  text-shadow: 0 0 6px rgba(255,255,255,0.6);

  background:rgba(0,255,255,0.18);
  backdrop-filter:blur(6px);

  box-shadow:
    0 0 8px rgba(0,255,255,0.4),
    inset 0 0 6px rgba(0,255,255,0.2);

  transition:all 0.25s ease;
}

.cta a:hover {
  transform:scale(1.08);
  background:rgba(0,255,255,0.41);
}

/* FOOTER */
footer {
  position:fixed;
  bottom:10px;
  width:100%;
  text-align:center;
  font-size:0.75rem;
  color:#666;
  opacity:0;
  transition:1.5s;
}
footer.visible { opacity:1; }

/* SPARKLE */
.sparkle {
  position:fixed;
  width:8px;
  pointer-events:none;
}

/* ========================= */
/* 📱 MOBILE FIX (REAL FIX) */
/* ========================= */
@media (max-width: 768px) {

  nav {
    right:50%;
    transform:translateX(50%);
    top:15px;
  }

  #logo-wrapper {
    position:relative;
    top:90px;
    transform:none;
  }

  #logo {
    width:140px;
  }

  #message {
    position:relative;
    top:110px;
    left:auto;
    transform:none;
    width:90%;
    margin:0 auto;
  }

  #message h1 {
    font-size:1.5rem;
  }

  .cta {
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
  }

  .cta a {
    width:85%;
    max-width:260px;
    padding:14px;
  }

  footer {
    position:relative;
    margin-top:40px;
    bottom:auto;
  }

  .loading-bar {
    width:260px;
  }
}

</style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/about">About</a>
  <a href="/contact">Contact</a>
</nav>

<div id="enter-screen">
  <h1>Tap to Enter</h1>
</div>

<div id="loader">
  <h2>
    <span>Loading</span>&nbsp;<span id="titleGlow"></span>
  </h2>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="barFill"></div>
  </div>
</div>

<canvas id="space"></canvas>

<div id="logo-wrapper">
  <img src="https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/SterlWorld%20Logo%202026.png" id="logo">
</div>

<div id="message">
  <h1>A Universe in the Making</h1>
  <p>SterlWorld is an independent game and multimedia studio creating original worlds.</p>

  <div class="cta">
    <a href="/pizzadales">Pizza Dales</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
</div>

<footer>
  © 2025 SterlWorld Entertainment LLC<br>
  <a href="/privacy" style="color:#0ff;">Privacy Policy</a> • 
  <a href="/terms" style="color:#0ff;">Terms of Service</a>
</footer>

<script>
// (your JS stays EXACTLY the same — no changes needed)
</script>

</body>
</html>
