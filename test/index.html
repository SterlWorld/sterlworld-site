<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>SterlWorld</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: black;
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 20px;
      right: 30px;
      z-index: 9999;
      display: flex;
      gap: 20px;
      font-size: 0.9rem;
    }

    nav a {
      color: #0ff;
      text-decoration: none;
      opacity: 0.8;
    }

    nav a:hover { opacity: 1; }

    /* ENTER SCREEN */
    #enter-screen {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100000;
      cursor: pointer;
    }

    #enter-screen h1 {
      font-family: 'Orbitron';
      font-size: clamp(2rem, 8vw, 4rem);
      text-shadow: 0 0 40px #0ff;
    }

    /* LOADER */
    #loader {
      position: fixed;
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99999;
    }

    .loading-bar {
      width: 300px;
      height: 16px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
      box-shadow: 0 0 12px #0ff;
    }

    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg,#0ff,#ff5ec4,#ffd700);
      box-shadow: 0 0 20px #0ff;
      transition: width 0.3s ease;
    }

    /* CANVAS */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s;
    }

    canvas.visible { opacity: 1; }

    /* LOGO */
    #logo-wrapper {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 10;
      opacity: 0;
      transition: 1.5s;
    }

    #logo-wrapper.visible { opacity: 1; }

    #logo {
      width: 220px;
    }

    /* MESSAGE */
    #message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      transition: 1.5s;
      pointer-events: auto;
    }

    #message.visible { opacity: 1; }

    #message h1 {
      font-family: 'Orbitron';
      text-shadow: 0 0 20px #0ff;
      margin-bottom: 10px;
    }

    #message p {
      color: #ccc;
      margin-bottom: 20px;
    }

    .cta a {
      margin: 5px;
      padding: 10px 16px;
      border: 1px solid #0ff;
      color: #0ff;
      text-decoration: none;
      border-radius: 6px;
    }

    footer {
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.75rem;
      color: #666;
      opacity: 0;
      transition: 1.5s;
    }

    footer.visible { opacity: 1; }

  </style>
</head>

<body>

<nav>
  <a href="/">Home</a>
  <a href="/about">About</a>
  <a href="/contact">Contact</a>
</nav>

<div id="enter-screen">
  <h1>Tap to Enter</h1>
</div>

<div id="loader">
  <h2>Loading SterlWorld</h2>
  <div class="loading-bar">
    <div class="loading-bar-fill" id="barFill"></div>
  </div>
</div>

<canvas id="space"></canvas>

<div id="logo-wrapper">
  <img src="https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/about/SterlWorld%20Logo%202026.png" id="logo">
</div>

<div id="message">
  <h1>A Universe in the Making</h1>
  <p>
    SterlWorld is an independent game and multimedia studio creating original worlds,
    characters, and interactive experiences.
  </p>

  <div class="cta">
    <a href="/pizzadales">Pizza Dales</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </div>
</div>

<footer>
  © 2025 SterlWorld Entertainment LLC<br>
  <a href="/privacy" style="color:#0ff;">Privacy Policy</a> • 
  <a href="/terms" style="color:#0ff;">Terms of Service</a>
</footer>

<script>
const enter = document.getElementById("enter-screen");
const loader = document.getElementById("loader");
const fill = document.getElementById("barFill");

enter.onclick = () => {
  enter.style.display = "none";
  loader.style.display = "flex";

  let progress = 0;

  let interval = setInterval(() => {
    progress += Math.random() * 8;
    fill.style.width = progress + "%";

    if (progress >= 100) {
      clearInterval(interval);

      setTimeout(() => {
        loader.style.display = "none";

        document.getElementById("space").classList.add("visible");
        document.getElementById("logo-wrapper").classList.add("visible");
        document.getElementById("message").classList.add("visible");
        document.querySelector("footer").classList.add("visible");

      }, 300);
    }
  }, 120);
};

/* STARFIELD */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const starImage = new Image();
starImage.src = "https://raw.githubusercontent.com/SterlWorld/sterlworld-site/main/Star.png";

let stars = [];

function createStar() {
  return {
    x: (Math.random() - 0.5) * w * 2,
    y: (Math.random() - 0.5) * h * 2,
    z: Math.random() * w,
  };
}

for (let i = 0; i < 200; i++) stars.push(createStar());

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0, 0, w, h);

  stars.forEach((s, i) => {
    s.z -= 0.5;

    if (s.z <= 0) {
      stars[i] = createStar();
      return;
    }

    let k = 128 / s.z;
    let px = s.x * k + w / 2;
    let py = s.y * k + h / 2;

    let size = (1 - s.z / w) * 20;

    ctx.globalAlpha = 0.35;

    if (starImage.complete) {
      ctx.drawImage(starImage, px, py, size, size);
    }
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
