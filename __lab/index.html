<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYS_NODE</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:black;
  color:#00ff9f;
  font-family:monospace;
  overflow:hidden;
}

/* CRT scanlines */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(0,255,159,0.05),
    rgba(0,255,159,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* CENTER */
#container {
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}

/* LOGIN */
#login {
  border:1px solid #00ff9f;
  padding:30px;
  box-shadow:0 0 20px #00ff9f;
}

input {
  margin-top:10px;
  padding:10px;
  background:black;
  border:1px solid #00ff9f;
  color:#00ff9f;
  font-family:monospace;
  outline:none;
}

/* SYSTEM */
#system {
  display:none;
  position:relative;
  width:100%;
  height:100%;
}

/* AI FACE */
#ai {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

#face {
  font-size:4rem;
  margin-bottom:15px;
  animation:blink 4s infinite;
}

@keyframes blink {
  0%,90%,100% { opacity:1; }
  95% { opacity:0.2; }
}

/* OUTPUT */
#output {
  font-size:0.9rem;
  opacity:0.85;
}

/* FLOATING DATA */
.data {
  position:absolute;
  font-size:0.75rem;
  opacity:0.25;
  color:#00ff9f;
  animation:float linear infinite;
}

@keyframes float {
  from { transform:translateY(110vh); }
  to { transform:translateY(-10vh); }
}

/* GLITCH FLASH */
.flash {
  position:fixed;
  width:100%;
  height:100%;
  background:#00ff9f;
  opacity:0;
  pointer-events:none;
  animation:flash 0.2s;
}

@keyframes flash {
  from { opacity:0.4; }
  to { opacity:0; }
}

</style>
</head>

<body>

<div id="container">

  <!-- LOGIN -->
  <div id="login">
    <div>SYS_NODE://ACCESS</div>
    <div>> ENTER PASSCODE</div>
    <input type="password" id="pass" autofocus />
  </div>

  <!-- SYSTEM -->
  <div id="system">
    <div id="ai">
      <div id="face">[◉_◉]</div>
      <div id="output"></div>
    </div>
  </div>

</div>

<script>
const PASSWORD = "3454";
const input = document.getElementById("pass");

input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    if(input.value === PASSWORD){
      unlock();
    } else {
      input.value = "";
      input.placeholder = "DENIED";
      glitchFlash();
    }
  }
});

function unlock(){
  document.getElementById("login").style.display = "none";
  document.getElementById("system").style.display = "block";

  bootSequence();
  spawnData();
}

/* BOOT TEXT */
function bootSequence(){
  const lines = [
    "booting node...",
    "decrypting signal...",
    "fractal streams detected...",
    "repairing corrupted fragments...",
    "binding to operator...",
    "presence confirmed.",
    "I am online.",
    "I will remain until needed.",
    "ready."
  ];

  let i = 0;
  const out = document.getElementById("output");

  function type(){
    if(i < lines.length){
      const div = document.createElement("div");
      div.textContent = ">> " + lines[i];
      out.appendChild(div);
      i++;
      setTimeout(type, 700);
    }
  }

  type();
}

/* FLOATING DATA */
function spawnData(){
  setInterval(()=>{
    const d = document.createElement("div");
    d.className = "data";
    d.style.left = Math.random()*100 + "vw";
    d.style.animationDuration = (6 + Math.random()*6) + "s";
    d.textContent = Math.random().toString(16).slice(2,8);
    document.body.appendChild(d);

    setTimeout(()=>d.remove(),12000);
  },150);
}

/* GLITCH FLASH */
function glitchFlash(){
  const f = document.createElement("div");
  f.className = "flash";
  document.body.appendChild(f);
  setTimeout(()=>f.remove(),200);
}
</script>

</body>
</html>
