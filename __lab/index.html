<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS ERROR</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:black;
  color:#ff2b2b;
  font-family:monospace;
  overflow:hidden;
}

/* CRT scanlines */
body::after {
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,0,0,0.05),
    rgba(255,0,0,0.05) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* CENTER */
#main {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  text-align:center;
}

/* FACE */
#face {
  font-size:5rem;
  margin-bottom:20px;
  animation:shake 0.2s infinite;
}

/* TEXT */
#text {
  font-size:1.5rem;
  text-shadow:0 0 10px red;
  animation:flicker 0.1s infinite alternate;
}

/* SHAKE */
@keyframes shake {
  0% { transform:translate(-50%,-50%) translateX(0); }
  25% { transform:translate(-50%,-50%) translateX(-3px); }
  50% { transform:translate(-50%,-50%) translateX(3px); }
  75% { transform:translate(-50%,-50%) translateX(-2px); }
  100% { transform:translate(-50%,-50%) translateX(2px); }
}

/* FLICKER */
@keyframes flicker {
  from { opacity:1; }
  to { opacity:0.6; }
}

/* FLOATING WARNINGS */
.warn {
  position:absolute;
  font-size:0.7rem;
  opacity:0.3;
  animation:float linear infinite;
}

@keyframes float {
  from { transform:translateY(110vh); }
  to { transform:translateY(-10vh); }
}
</style>
</head>

<body>

<div id="main">
  <div id="face">[⚠_⚠]</div>
  <div id="text">YOU DONT BELONG HERE!!!</div>
</div>

<script>
const textEl = document.getElementById("text");

/* REPEAT MESSAGE LOOP */
setInterval(()=>{
  textEl.textContent = "YOU DONT BELONG HERE!!!";
}, 200);

/* FLOATING CHAOS TEXT */
const phrases = [
  "ERROR 403",
  "ACCESS VIOLATION",
  "WARNING",
  "UNAUTHORIZED",
  "SYSTEM BREACH",
  "DENIED",
  "CORRUPTED DATA",
  "TRACE ACTIVE",
  "SIGNAL BLOCKED",
  "INTRUSION DETECTED"
];

function spawnWarning(){
  const w = document.createElement("div");
  w.className = "warn";
  w.style.left = Math.random()*100 + "vw";
  w.style.animationDuration = (4 + Math.random()*6) + "s";
  w.textContent = phrases[Math.floor(Math.random()*phrases.length)];
  document.body.appendChild(w);

  setTimeout(()=>w.remove(),10000);
}

setInterval(spawnWarning, 120);

/* SCREEN FLASHES */
setInterval(()=>{
  const flash = document.createElement("div");
  flash.style.position = "fixed";
  flash.style.width = "100%";
  flash.style.height = "100%";
  flash.style.background = "red";
  flash.style.opacity = "0.08";
  document.body.appendChild(flash);

  setTimeout(()=>flash.remove(), 80);
}, 600);
</script>

</body>
</html>
