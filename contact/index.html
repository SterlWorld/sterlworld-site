<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact SterlWorld</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: black;
      font-family: 'Poppins', sans-serif;
      color: #ddd;
      line-height: 1.7;
      padding: 20px;
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: flex-end;
      gap: 20px;
      margin-bottom: 20px;
      padding-right: 10px;
    }

    nav a {
      text-decoration: none;
      color: #0ff;
      font-size: 0.9rem;
      transition: opacity 0.3s;
    }

    nav a:hover {
      opacity: 0.6;
    }

    /* LOGO */
    .logo {
      display: block;
      margin: 20px auto 10px auto;
      width: 140px;
      max-width: 60%;
    }

    /* MAIN */
    main {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: #fff;
      font-size: 2.2rem;
      margin-bottom: 20px;
    }

    p {
      margin-bottom: 18px;
      font-size: 1.05rem;
    }

    .contact-box {
      margin-top: 30px;
      font-size: 1rem;
      line-height: 1.8;
    }

    .contact-box strong {
      display: block;
      margin-top: 15px;
      margin-bottom: 5px;
      color: #fff;
    }

    footer {
      margin-top: 50px;
      text-align: center;
      font-size: 0.8rem;
      color: #555;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      h1 { font-size: 1.7rem; }
      nav { justify-content: center; }
      .logo { width: 120px; }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
  </nav>

  <img 
    src="https://raw.githubusercontent.com/SterlWorld/sterlworld-site/refs/heads/main/about/SterlWorld%20Logo%202026.png" 
    alt="SterlWorld Logo" 
    class="logo"
  />

  <main>
    <h1>Contact</h1>

    <p>
      For general inquiries, business matters, or support, please reach out using the information below.
    </p>

    <div class="contact-box">
      <strong>General Inquiries</strong>
      info@sterlworld.com

      <strong>Support</strong>
      support@sterlworld.com
    </div>
  </main>

  <footer>
    © 2025 SterlWorld Entertainment LLC
  </footer>

</body>
</html>
